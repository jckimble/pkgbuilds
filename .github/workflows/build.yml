on:
  push:
    branches:
      - master

jobs:
  variables:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive
    - id: set-matrix
      run: echo "::set-output name=matrix::`find . -iname 'PKGBUILD' -exec bash -c \"basename \\$(dirname \\"{}\\")\" \; | jq -R -s -c 'split(\"\n\")[:-1]'`"

  build-packages:
    runs-on: ubuntu-latest
    needs: variables

    strategy:
      matrix:
        package: ${{fromJson(needs.variables.outputs.matrix)}}
    
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive
    - name: Build Package ${{ matrix.package }}
      uses: ./.github/actions/archlinux
      with:
        directory: ${{ matrix.package }}
        scripts: "makepkg -si -C -c --config ../makepkg.conf --noconfirm --noprogressbar"
    - uses: actions/upload-artifact@v3
      with:
        name: packages
        path: docs/pkg/${{ matrix.package }}*
        retention-days: 1
  
  build-repo:
    runs-on: "ubuntu-latest"
    needs: build-packages

    steps:
    - uses: actions/checkout@v2
    - uses: actions/download-artifact@v3
      with:
        name: packages
        path: docs/pkg/
    - name: "Create Repo"
      uses: ./.github/actions/archlinux
      with:
        directory: docs
        scripts: "repo-add -R -n -q jckimble.db.tar.xz pkg/*"
    - name: "Commit and Push Packages"
      run: |
        ls -lAh
        rm *.old
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add docs
        git add docs/pkg/*
        git status
        git commit -m "Add Packages"
        git push -u origin master